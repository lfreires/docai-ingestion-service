name: cd

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image
        run: |
          az acr login --name "$ACR_NAME"
          docker build -t "$ACR_LOGIN_SERVER/docai-ingestion-service:${GITHUB_SHA}" .
          docker push "$ACR_LOGIN_SERVER/docai-ingestion-service:${GITHUB_SHA}"
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      - name: Deploy Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/docai-ingestion-service:${GITHUB_SHA}"
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      - name: Smoke test
        run: curl --fail --retry 5 --retry-delay 10 "$HEALTH_URL"
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
